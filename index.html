<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ansiblex Zones</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='6' fill='none' stroke='%233fbf6f' stroke-width='2'/><circle cx='8' cy='8' r='2' fill='%23e05c3a'/></svg>">
<style>
  :root {
    --panel: rgba(9, 11, 13, .88);
    --line: #23272c;
    --line2: #383e45;
    --txt: #b9bfc6;
    --bright: #e6eaee;
    --mut: #697077;
    --acc: #d8a23a;
    --mono: Consolas, "Liberation Mono", Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #050607; color: var(--txt);
    font: 11px/1.5 Verdana, Geneva, sans-serif; }
  #app { position: absolute; inset: 0; }

  #panel { position: absolute; top: 10px; left: 10px; width: 252px; background: var(--panel);
    border: 1px solid var(--line); backdrop-filter: blur(6px); padding: 10px 12px 12px; user-select: none;
    transition: transform .25s ease; }
  #panel.closed { transform: translateX(-100%); }
  #tab { position: absolute; left: 100%; top: 14px; width: 22px; height: 48px; background: var(--panel);
    border: 1px solid var(--line); border-left: none; color: var(--acc); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 10px; }
  #tab::after { content: '◂'; }
  #panel.closed #tab::after { content: '▸'; }
  #panel header { font-size: 10px; letter-spacing: .18em; color: var(--bright);
    padding-bottom: 7px; margin-bottom: 9px; border-bottom: 1px solid var(--line); }
  #panel header em { font-style: normal; color: var(--acc); }

  .lbl { font-size: 9px; letter-spacing: .1em; color: var(--mut); margin: 8px 0 3px; }
  .box { position: relative; }
  .box input { width: 100%; padding: 5px 7px; background: #0b0e11; color: var(--bright);
    border: 1px solid var(--line2); outline: none; font: inherit; }
  .box input:focus { border-color: var(--acc); }
  .box input::placeholder { color: #4d545b; }
  .sug { position: absolute; top: 100%; left: 0; right: 0; z-index: 10; background: #0b0e11;
    border: 1px solid var(--line2); border-top: 0; display: none; }
  .sug div { padding: 4px 7px; cursor: pointer; }
  .sug div small { color: var(--mut); font-size: 10px; }
  .sug div.active, .sug div:hover { background: #14181d; box-shadow: inset 2px 0 var(--acc); }

  #capital { margin-top: 7px; display: none; }
  #capital b { color: var(--bright); font-weight: bold; }
  #capital small { color: var(--mut); }
  #capital a { color: var(--mut); cursor: pointer; float: right; font-family: var(--mono); }
  #capital a:hover { color: var(--acc); }

  #cap { display: flex; align-items: center; gap: 12px; margin-top: 3px; }
  #cap text { font: 11px var(--mono); fill: var(--bright); }
  #cap text.u { font-size: 8px; fill: var(--mut); }
  #capStats { font-size: 10px; line-height: 1.7; color: var(--mut); }
  #capStats b { color: var(--txt); font-weight: normal; font-family: var(--mono); }

  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  #zones tr { cursor: default; }
  #zones tr:hover td { background: #12161b; }
  th { font-size: 9px; letter-spacing: .1em; color: var(--mut); font-weight: normal;
    text-align: left; padding: 2px 4px 4px; border-bottom: 1px solid var(--line2); }
  td { padding: 3px 4px; border-bottom: 1px solid var(--line); }
  td:nth-child(2), td:nth-child(3), td:nth-child(4) { font-family: var(--mono); }
  td:last-child, th:last-child, td:nth-child(3), th:nth-child(3) { text-align: right; }
  tr:last-child td { border-bottom: 0; }
  .sw { display: inline-block; width: 8px; height: 8px; margin-right: 6px; }

  #tooltip { position: absolute; pointer-events: none; background: var(--panel);
    border: 1px solid var(--line2); padding: 6px 9px; display: none; z-index: 20; white-space: nowrap; }
  #tooltip b { color: var(--bright); }
  #tooltip .dim { color: var(--mut); }
  #tooltip .num { font-family: var(--mono); }

  @media (max-width: 640px) { #panel { width: calc(100% - 20px); } }
</style>
</head>
<body>
<div id="app"></div>
<div id="panel">
  <header>ANSIBLEX <em>//</em> ZONES</header>
  <div class="lbl">CAPITAL SYSTEM</div>
  <div class="box">
    <input id="q" placeholder="system name" autocomplete="off" spellcheck="false">
    <div id="suggestions" class="sug"></div>
  </div>
  <div id="capital"></div>
  <div class="lbl">SHIP CLASS</div>
  <div class="box">
    <input id="ship" autocomplete="off" spellcheck="false">
    <div id="shipSuggestions" class="sug"></div>
  </div>
  <div class="lbl">ANSIBLEX CAPACITOR</div>
  <div id="cap">
    <svg id="capWheel" width="76" height="76" viewBox="0 0 76 76"></svg>
    <div id="capStats"></div>
  </div>
  <table id="zones"></table>
  <div id="tab"></div>
</div>
<div id="tooltip"></div>
<script type="importmap">{ "imports": { "three": "./vendor/three.module.min.js" } }</script>
<script type="module" src="app.js"></script>
</body>
</html>
